name: Update Nikkei RSS Feed

on:
  schedule:
    # 每4小时运行一次 (GitHub Actions 使用 UTC 时间，+8小时即北京时间)
    # 0 */4 * * * 表示每4小时的整点
    - cron: '0 */4 * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml
          
      - name: Run Scraper
        run: |
          python nikkei_cn_rss.py
          
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add nikkei_feed.xml
          # 只有当文件有变化时才提交
          git diff --staged --quiet || git commit -m "Update Nikkei RSS Feed $(date '+%Y-%m-%d %H:%M:%S')"
          git push
