name: 日经中文网RSS更新

on:
  schedule:
    # 每天UTC时间 1:00, 9:00, 17:00 运行 (北京时间 9:00, 17:00, 1:00)
    - cron: '0 1,9,17 * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  generate-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 feedgenerator lxml
      
      - name: 生成RSS
        run: |
          python nikkei_rss.py
        env:
          NIKKEI_CATEGORIES: ${{ vars.NIKKEI_CATEGORIES || 'trend' }}
      
      - name: 检查RSS文件
        run: |
          if [ -f rss.xml ]; then
            echo "RSS文件生成成功，大小: $(wc -c < rss.xml) 字节"
          else
            echo "RSS文件生成失败"
            exit 1
          fi
      
      - name: 部署到GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
          destination_dir: ./
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '更新RSS: ${{ github.run_number }}'
      
      - name: 上传RSS文件作为Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rss-feed
          path: rss.xml
          retention-days: 7

  # 可选：验证RSS的有效性
  validate-rss:
    runs-on: ubuntu-latest
    needs: generate-rss
    steps:
      - name: 检出gh-pages分支
        uses: actions/checkout@v4
        with:
          ref: gh-pages
      
      - name: 验证RSS
        run: |
          if [ -f rss.xml ]; then
            echo "RSS文件存在，进行验证..."
            # 使用feedparser进行验证
            pip install feedparser
            python -c "
            import feedparser
            feed = feedparser.parse('rss.xml')
            if feed.bozo:
                print('RSS验证失败:', feed.bozo_exception)
                exit(1)
            print(f'RSS验证成功！包含 {len(feed.entries)} 篇文章')
            "
          else
            echo "RSS文件不存在"
            exit 1
          fi