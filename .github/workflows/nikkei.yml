name: 抓取日经中文网
#on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 运行全文抓取脚本
        run: python nikkei_fulltext_rss.py
      
      - name: 提交更新
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add feed.xml
          git commit -m "更新日经中文" || echo "无变化"
          git push
