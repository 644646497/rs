name: Nikkei RSS

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
 build:

  runs-on: ubuntu-latest

  permissions:
    contents: write

  steps:

  - uses: actions/checkout@v4

  - name: install
    run: |
      pip install -r requirements.txt

  - name: build
    run: |
      python main.py

  - name: save
    run: |
      git config user.name github-actions
      git config user.email actions@github.com
      git add nikkei-full.xml
      git commit -m update || exit 0
      git push